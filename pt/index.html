<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LDtech | Recepcionista IA</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #ffffff;
      --bg-2: #fbfbfb;
      --bg-3: #f3f3f3;
      --text: #0a0a0a;
      --muted: rgba(0, 0, 0, 0.68);
      --line: rgba(0, 0, 0, 0.10);
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.012) 24%, rgba(0,0,0,0) 52%),
        radial-gradient(circle at 14% 18%, rgba(0,0,0,0.05), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(0,0,0,0.04), transparent 22%),
        radial-gradient(circle at 20% 84%, rgba(0,0,0,0.03), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.008) 26%, rgba(0,0,0,0) 54%),
        linear-gradient(300deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0) 40%);
      z-index: 0;
    }

    .hero,
    .section,
    .cta,
    footer {
      position: relative;
      z-index: 1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 290px;
      max-width: 82vw;
      height: 100vh;
      background: rgba(255,255,255,0.98);
      border-right: 1px solid rgba(0,0,0,0.10);
      box-shadow: 18px 0 40px rgba(0,0,0,0.10);
      padding: 100px 24px 24px;
      z-index: 10000;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow: visible;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-toggle {
      position: absolute;
      top: 0;
      right: -86px;
      z-index: 10001;
      width: 86px;
      height: 86px;
      border: 1px solid rgba(0,0,0,0.10);
      border-left: none;
      background: rgba(255,255,255,0.98);
      border-radius: 0 0 18px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 18px 0 40px rgba(0,0,0,0.10);
      padding: 8px;
      overflow: hidden;
    }

    .sidebar-toggle img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      display: block;
      filter: brightness(0) saturate(100%);
    }

    .sidebar-language {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .lang-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      font-size: 26px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #000000;
      background: #ffffff;
      color: #000000;
      transition: 0.2s ease;
      line-height: 1;
    }

    .lang-btn:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
    }

    .lang-btn.active {
      background: #ffffff;
      border: 1px solid #000000;
      color: #000000;
      box-shadow: none;
    }

    .sidebar > a {
      display: block;
      text-decoration: none;
      color: #000000;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .sidebar > a:hover {
      opacity: 0.65;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .sidebar-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-cta {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .sidebar-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: -0.015em;
      border-radius: 16px;
      padding: 14px 16px;
      transition: 0.2s ease;
    }

    .sidebar-cta .sidebar-btn {
      border-bottom: none;
      font-size: 18px;
    }

    .sidebar-btn:hover {
      transform: translateY(-1px);
    }

    .sidebar-cta .sidebar-btn-primary {
      background: #000000;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }

    .sidebar-cta .sidebar-btn-secondary {
      background: rgba(0,0,0,0.03);
      color: #000000;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .sidebar-socials {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .sidebar-socials a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      border-radius: 16px;
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.10);
      text-decoration: none;
      color: #000000;
      font-weight: 700;
      padding: 0;
    }

    .sidebar-socials a:hover {
      opacity: 0.7;
    }

    .sidebar-socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      display: block;
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 88px 40px 72px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      gap: 44px;
      align-items: start;
      scroll-margin-top: 120px;
    }

    .hero-demo {
      width: 100%;
      max-width: 480px;
      justify-self: end;
    }

    .hero h1 {
      font-size: 64px;
      line-height: 1.03;
      letter-spacing: -0.04em;
      margin-bottom: 34px;
      max-width: 780px;
    }

    .hero-copy {
      margin-bottom: 30px;
      max-width: 700px;
    }

    .hero-copy p {
      color: var(--muted);
      font-size: 21px;
      letter-spacing: -0.015em;
    }

    .hero-copy p + p {
      margin-top: 18px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 22px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.015em;
      border-radius: 18px;
      padding: 15px 24px;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #ffffff;
      background: #000000;
      box-shadow: 0 16px 34px rgba(0,0,0,0.12);
    }

    .btn-secondary {
      color: #000000;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.03);
    }

    .demo-box {
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(246,246,246,0.96));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.08);
    }

    .demo-inner {
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 22px;
      padding: 18px;
      background: rgba(255,255,255,0.78);
    }

    .demo-label {
      color: #000000;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .message {
      padding: 16px 18px;
      border-radius: 20px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .user-msg {
      background: rgba(0,0,0,0.05);
      color: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .system-msg {
      background: rgba(0,0,0,0.08);
      color: #000000;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .chat-user,
    .chat-logo {
      width: 74px;
      height: 74px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chat-user svg {
      width: 46px;
      height: 46px;
      fill: rgba(0,0,0,0.82);
      display: block;
    }

    .chat-logo img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
      filter: brightness(0) saturate(100%);
    }

    .message-text {
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.012em;
      color: inherit;
      flex: 1;
      min-width: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(0,0,0,0.04);
      border-radius: 18px;
      padding: 20px;
      font-size: 17px;
      color: rgba(0,0,0,0.95);
    }

    .stat strong {
      display: inline-block;
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 82px 40px;
      scroll-margin-top: 120px;
    }

    .section-title {
      color: #000000;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section h2 {
      font-size: 44px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .section-intro {
      color: var(--muted);
      max-width: 840px;
      font-size: 19px;
      letter-spacing: -0.015em;
      margin-bottom: 32px;
    }

    .features,
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,247,247,0.95));
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    }

    .card h4,
    .card h3 {
      font-size: 21px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
    }

    .card p {
      color: var(--muted);
      font-size: 16px;
      letter-spacing: -0.012em;
    }

    .step-number {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.08);
      color: #000000;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .industries {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .pill {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(0,0,0,0.03);
      font-size: 14px;
      color: rgba(0,0,0,0.92);
      letter-spacing: -0.01em;
    }

    .why-box {
      margin-top: 30px;
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(0,0,0,0.08);
      background: linear-gradient(135deg, rgba(0,0,0,0.04), rgba(0,0,0,0.02));
    }

    .why-box ul {
      margin-top: 14px;
      padding-left: 18px;
    }

    .why-box li {
      margin-bottom: 10px;
      color: rgba(0,0,0,0.84);
    }

    .contact-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .contact-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,247,247,0.95));
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 24px;
      padding: 24px;
    }

    .contact-card p {
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .contact-card a {
      color: #000000;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
    }

    .cta {
      text-align: center;
      padding: 92px 40px;
      border-top: 1px solid var(--line);
      margin-top: 20px;
    }

    .cta h2 {
      font-size: 48px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .cta p {
      color: var(--muted);
      max-width: 760px;
      margin: 0 auto 30px;
      font-size: 19px;
      letter-spacing: -0.015em;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 24px 40px 36px;
      color: rgba(0,0,0,0.6);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .hero,
      .features,
      .steps,
      .contact-box,
      .stats {
        grid-template-columns: 1fr;
      }

      .hero,
      .section,
      .cta {
        padding-left: 20px;
        padding-right: 20px;
      }

      .hero {
        padding-top: 110px;
      }

      .hero-demo {
        max-width: 100%;
        justify-self: stretch;
      }

      .hero h1,
      .section h2,
      .cta h2 {
        font-size: 40px;
      }

      .btn {
        width: 100%;
      }

      .sidebar {
        width: 260px;
        padding-top: 92px;
      }

      .sidebar-toggle {
        right: -78px;
        width: 78px;
        height: 78px;
      }

      .sidebar-toggle img {
        width: 52px;
        height: 52px;
      }

      .chat-user,
      .chat-logo {
        width: 68px;
        height: 68px;
      }

      .chat-user svg {
        width: 42px;
        height: 42px;
      }

      .chat-logo img {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
